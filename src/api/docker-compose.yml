version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: iot-sensor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iot_sensor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iot_sensor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot-sensor-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=iot_sensor
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local